<div class="page-wrap">
  <div class="page-header">
    <div>
      <h3 class="title">Greenhouses</h3>
      <p class="sub">Create greenhouse zones and manage devices per section.</p>
    </div>

    <a class="btn-refresh" routerLink="/greenhouses/create">+ Create Greenhouse</a>
  </div>

  <div *ngIf="loading" class="loading">Loading greenhouses...</div>

  <div class="grid" *ngIf="!loading && rows.length">
    <a class="card" *ngFor="let g of rows" [routerLink]="['/greenhouses', g.id]">
      <div class="top">
        <div class="name">
          <div class="device">{{ g.name }}</div>
          <div class="meta">
            <span class="pill on">{{ g.section_count }} Zones</span>
            <span>• {{ g.total_area_m2 }} m²</span>
          </div>
        </div>
      </div>

      <div class="stats">
        <div class="stat">
          <div class="label">Total Area</div>
          <div class="val">{{ g.total_area_m2 }} <span class="u">m²</span></div>
        </div>
        <div class="stat">
          <div class="label">Sections</div>
          <div class="val">{{ g.section_count }}</div>
        </div>
      </div>

      <div class="actions">
        <span class="btn-refresh">Open</span>
      </div>
    </a>
  </div>

  <div class="empty" *ngIf="!loading && !rows.length">
    No greenhouses yet. Click <b>Create Greenhouse</b>.
  </div>
</div>
